name: "centreon-plugin-rust-snmp"
arch: "${ARCH}"
platform: "linux"
version_schema: "none"
version: "${VERSION}"
release: "${RELEASE}${DIST}"
section: "default"
priority: "optional"
maintainer: "Centreon <contact@centreon.com>"
description: |
  Centreon Rust SNMP Plugin allows monitoring of various systems and applications through SNMP using collection files.
vendor: "Centreon"
homepage: "https://www.centreon.com"
license: "Apache-2.0"

contents:
  - src: "../target/release/centreon-plugin-rust-snmp"
    dst: "/usr/lib/centreon/plugins/"
    expand: true
    file_info:
      mode: 0755
      owner: "root"
      group: "root"

  - src: "../rs-collections/centreon-plugin-rust-snmp/*.json"
    dst: "/usr/lib/centreon/plugins/rs-collections/centreon-plugin-rust-snmp/"
    file_info:
      mode: 0644
      owner: "root"
      group: "root"

rpm:
  summary: Centreon Rust SNMP Plugin
  signature:
    key_file: ${RPM_SIGNING_KEY_FILE}
    key_id: ${RPM_SIGNING_KEY_ID}
