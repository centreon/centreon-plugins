name: packaging-plugins-windows

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  push:
    branches:
      - develop
    paths:
      - ".github/workflows/packaging-plugins-windows.yml"
      - ".github/scripts/build_centreon_plugins_64.bat"
      - ".github/patch/ntp.diff"
  pull_request:
    paths:
      - ".github/workflows/packaging-plugins-windows.yml"
      - ".github/scripts/build_centreon_plugins_64.bat"
      - ".github/patch/ntp.diff"

jobs:
  dependency-scan:
    uses: centreon/security-tools/.github/workflows/dependency-analysis.yml@main

  get-environment:
    needs: [dependency-scan]
    uses: ./.github/workflows/get-environment.yml

  build:
    needs: [get-environment]
    if: |
      false && needs.get-environment.outputs.skip_workflow == 'false' &&
      needs.get-environment.outputs.stability != 'stable'
    runs-on: windows-latest

    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Restore Perl environment from cache
        id: cache-perl
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: C:\Strawberry
          key: strawberry-perl-5.34.3.1-${{ hashFiles('.github/patch/ntp.diff') }}

      - name: Install Strawberry Perl (cache miss fallback)
        if: steps.cache-perl.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          Invoke-WebRequest `
            -Uri https://github.com/StrawberryPerl/Perl-Dist-Strawberry/releases/download/sp5.34.3.1/strawberry-perl-5.34.3.1-64bit.msi `
            -OutFile strawberry-perl.msi
          Start-Process msiexec.exe -ArgumentList '/i strawberry-perl.msi /quiet /norestart' -Wait -NoNewWindow
          Remove-Item strawberry-perl.msi

      - name: Install CPAN modules (cache miss fallback)
        if: steps.cache-perl.outputs.cache-hit != 'true'
        shell: cmd
        run: |
          set PATH=C:\Strawberry\perl\bin;C:\Strawberry\perl\site\bin;C:\Strawberry\c\bin;%PATH%
          set PKG_CONFIG_PATH=C:\Strawberry\c\lib\pkgconfig
          C:\Strawberry\perl\bin\cpanm --force --notest ^
            PAR::Packer ^
            Authen::NTLM ^
            Date::Manip ^
            Email::Send::SMTP::Gmail ^
            HTTP::ProxyPAC ^
            IO::Socket::SSL ^
            JE ^
            JSON::XS ^
            Net::FTPSSL ^
            Net::NTP ^
            Net::SSLeay ^
            Pod::Simple::Search ^
            Tie::RefHash::Weak ^
            Win32::Job ^
            XML::LibXML

      - name: Install libcurl dev files (cache miss fallback)
        if: steps.cache-perl.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          Invoke-WebRequest `
            -Uri "https://curl.se/windows/dl-8.7.1_1/curl-8.7.1_1-win64-mingw.zip" `
            -OutFile curl.zip
          Expand-Archive curl.zip -DestinationPath C:\curl-tmp -Force
          $src = (Get-ChildItem C:\curl-tmp -Directory | Select-Object -First 1).FullName
          Copy-Item "$src\include\curl" "C:\Strawberry\c\include\" -Recurse -Force
          Copy-Item "$src\lib\libcurl.dll.a" "C:\Strawberry\c\lib\" -Force
          Copy-Item "$src\bin\libcurl-x64.dll" "C:\Strawberry\c\bin\" -Force
          $pc = 'prefix=C:/Strawberry/c',
            'exec_prefix=${prefix}',
            'libdir=${exec_prefix}/lib',
            'includedir=${prefix}/include',
            '',
            'Name: libcurl',
            'Description: Library to transfer files with ftp, http, etc.',
            'Version: 8.7.1',
            'Libs: -L${libdir} -lcurl',
            'Cflags: -I${includedir}'
          ($pc -join "`n") + "`n" | Set-Content 'C:\Strawberry\c\lib\pkgconfig\libcurl.pc' -Encoding ASCII
          Remove-Item curl.zip, C:\curl-tmp -Recurse -Force

      - name: Install Net::Curl (cache miss fallback)
        if: steps.cache-perl.outputs.cache-hit != 'true'
        shell: cmd
        run: |
          set PATH=C:\Strawberry\perl\bin;C:\Strawberry\perl\site\bin;C:\Strawberry\c\bin;%PATH%
          set PKG_CONFIG_PATH=C:\Strawberry\c\lib\pkgconfig
          C:\Strawberry\perl\bin\cpanm --notest Net::Curl

      - name: Apply NTP patch (cache miss fallback)
        if: steps.cache-perl.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          $ntpPath = & C:\Strawberry\perl\bin\perl.exe -MNet::NTP -e 'print $INC{"Net/NTP.pm"}'
          & "C:\Program Files\Git\usr\bin\patch.exe" $ntpPath .github\patch\ntp.diff

      - name: Add Strawberry Perl to PATH
        shell: powershell
        run: |
          Add-Content $env:GITHUB_PATH "C:\Strawberry\perl\bin"
          Add-Content $env:GITHUB_PATH "C:\Strawberry\perl\site\bin"
          Add-Content $env:GITHUB_PATH "C:\Strawberry\c\bin"

      - name: Setup build directory structure
        shell: cmd
        run: |
          mklink /J ".github\scripts\centreon-plugins" "."
          mkdir ".github\scripts\resources\scripts\x64\centreon"

      - name: Build Windows executable
        shell: cmd
        run: .github\scripts\build_centreon_plugins_64.bat

      - name: Upload executable artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: centreon_plugins_windows_x64
          path: .github\scripts\resources\scripts\x64\centreon\centreon_plugins.exe
          retention-days: 7

  set-skip-label:
    needs: [get-environment, build]
    if: |
      needs.get-environment.outputs.skip_workflow == 'false' &&
      ! cancelled() &&
      ! contains(needs.*.result, 'failure') &&
      ! contains(needs.*.result, 'cancelled')
    uses: ./.github/workflows/set-pull-request-skip-label.yml
