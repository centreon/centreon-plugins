name: docker-builder-packaging-plugins-windows

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  push:
    branches:
      - develop
    paths:
      - ".github/workflows/docker-builder-packaging-plugins-windows.yml"
      - ".github/patch/ntp.diff"
  pull_request:
    paths:
      - ".github/workflows/docker-builder-packaging-plugins-windows.yml"
      - ".github/patch/ntp.diff"

jobs:
  dependency-scan:
    uses: centreon/security-tools/.github/workflows/dependency-analysis.yml@main

  get-environment:
    needs: [dependency-scan]
    uses: ./.github/workflows/get-environment.yml

  build-environment:
    needs: [get-environment]
    if: |
      needs.get-environment.outputs.skip_workflow == 'false' &&
      needs.get-environment.outputs.stability != 'stable'
    runs-on: windows-latest

    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check cache
        id: cache-perl
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: C:\Strawberry
          key: strawberry-perl-5.34.3.1-${{ hashFiles('.github/patch/ntp.diff') }}
          lookup-only: true

      - name: Install Strawberry Perl
        if: steps.cache-perl.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          Invoke-WebRequest `
            -Uri https://github.com/StrawberryPerl/Perl-Dist-Strawberry/releases/download/sp5.34.3.1/strawberry-perl-5.34.3.1-64bit.msi `
            -OutFile strawberry-perl.msi
          Start-Process msiexec.exe -ArgumentList '/i strawberry-perl.msi /quiet /norestart' -Wait -NoNewWindow
          Remove-Item strawberry-perl.msi

      - name: Install CPAN modules except Curl
        if: steps.cache-perl.outputs.cache-hit != 'true'
        shell: cmd
        run: |
          set PATH=C:\Strawberry\perl\bin;C:\Strawberry\perl\site\bin;C:\Strawberry\c\bin;%PATH%
          set PKG_CONFIG_PATH=C:\Strawberry\c\lib\pkgconfig
          set LIBCURL_INCLUDE=C:\Strawberry\c\include
          set LIBCURL_LIBS=-LC:\Strawberry\c\lib -lcurl
          C:\Strawberry\perl\bin\cpanm --notest ^
            PAR::Packer ^
            Authen::NTLM ^
            Date::Manip ^
            Email::Send::SMTP::Gmail ^
            HTTP::ProxyPAC ^
            IO::Socket::SSL ^
            JE ^
            JSON::XS ^
            Net::FTPSSL ^
            Net::NTP ^
            Net::SSLeay ^
            Pod::Simple::Search ^
            Tie::RefHash::Weak ^
            Win32::Job ^
            XML::LibXML

      - name: Install libcurl dev files
        if: steps.cache-perl.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          Invoke-WebRequest `
            -Uri "https://curl.se/windows/dl-8.7.1_1/curl-8.7.1_1-win64-mingw.zip" `
            -OutFile curl.zip
          Expand-Archive curl.zip -DestinationPath C:\curl-tmp -Force
          $src = (Get-ChildItem C:\curl-tmp -Directory | Select-Object -First 1).FullName
          Copy-Item "$src\include\curl" "C:\Strawberry\c\include\" -Recurse -Force
          Copy-Item "$src\lib\libcurl.dll.a" "C:\Strawberry\c\lib\" -Force
          Copy-Item "$src\bin\libcurl-x64.dll" "C:\Strawberry\c\bin\" -Force
          @"
prefix=C:/Strawberry/c
exec_prefix=`${prefix}
libdir=`${exec_prefix}/lib
includedir=`${prefix}/include
Name: libcurl
Description: Library to transfer files with ftp, http, etc.
Version: 8.7.1
Libs: -L`${libdir} -lcurl
Cflags: -I`${includedir}
"@ | Set-Content "C:\Strawberry\c\lib\pkgconfig\libcurl.pc" -Encoding ASCII
          Remove-Item curl.zip, C:\curl-tmp -Recurse -Force

      - name: Install CPAN Curl module
        if: steps.cache-perl.outputs.cache-hit != 'true'
        shell: cmd
        run: |
          set PATH=C:\Strawberry\perl\bin;C:\Strawberry\perl\site\bin;C:\Strawberry\c\bin;%PATH%
          set PKG_CONFIG_PATH=C:\Strawberry\c\lib\pkgconfig
          C:\Strawberry\perl\bin\cpanm --notest Net::Curl

      - name: Show cpanm build logs on failure
        if: failure()
        shell: powershell
        run: |
          $logDir = "$env:USERPROFILE\.cpanm\work"
          if (Test-Path $logDir) {
            Get-ChildItem -Path $logDir -Recurse -Filter "build.log" | ForEach-Object {
              Write-Host "`n=== $($_.FullName) ==="
              Get-Content $_.FullName | Select-Object -Last 50
            }
          }

      - name: Apply NTP patch for Windows compatibility
        if: steps.cache-perl.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          $ntpPath = & C:\Strawberry\perl\bin\perl.exe -MNet::NTP -e 'print $INC{"Net/NTP.pm"}'
          & "C:\Program Files\Git\usr\bin\patch.exe" $ntpPath .github\patch\ntp.diff

      - name: Save environment to cache
        if: steps.cache-perl.outputs.cache-hit != 'true'
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: C:\Strawberry
          key: strawberry-perl-5.34.3.1-${{ hashFiles('.github/patch/ntp.diff') }}

  set-skip-label:
    needs: [get-environment, build-environment]
    if: |
      needs.get-environment.outputs.skip_workflow == 'false' &&
      ! cancelled() &&
      ! contains(needs.*.result, 'failure') &&
      ! contains(needs.*.result, 'cancelled')
    uses: ./.github/workflows/set-pull-request-skip-label.yml
