name: perl-cpan-libraries

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/perl-cpan-libraries.yml"
  push:
    branches:
      - develop
      - dev-[2-9][0-9].[0-9][0-9].x
      - master
      - "[2-9][0-9].[0-9][0-9].x"
    paths:
      - ".github/workflows/perl-cpan-libraries.yml"

jobs:
  dependency-scan:
    uses: centreon/security-tools/.github/workflows/dependency-analysis.yml@main

  get-environment:
    needs: [dependency-scan]
    uses: ./.github/workflows/get-environment.yml

  check-official-repos:
    needs: [get-environment]
    if: |
      needs.get-environment.outputs.skip_workflow == 'false' &&
      needs.get-environment.outputs.stability != 'stable'
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - distrib: el8
            image: almalinux:8
          - distrib: el9
            image: almalinux:9
          - distrib: el10
            image: almalinux:10
          - distrib: bullseye
            image: debian:bullseye
          - distrib: bookworm
            image: debian:bookworm
          - distrib: trixie
            image: debian:trixie
          - distrib: jammy
            image: ubuntu:jammy
          - distrib: noble
            image: ubuntu:noble
    container:
      image: ${{ matrix.image }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup RPM environment
        if: ${{ contains(fromJson('["el8","el9","el10"]'), matrix.distrib) }}
        run: |
          dnf install -y 'dnf-command(config-manager)' epel-release
          if [ "${{ matrix.distrib }}" = "el8" ]; then
            dnf config-manager --set-enabled powertools
          else
            dnf config-manager --set-enabled crb
          fi
          dnf install -y python3 perl-App-cpanminus
        shell: bash

      - name: Setup DEB environment
        if: ${{ !contains(fromJson('["el8","el9","el10"]'), matrix.distrib) }}
        run: |
          apt-get update -qq
          apt-get install -y python3 cpanminus
        shell: bash

      - name: Parse distrib name
        id: parse-distrib
        uses: ./.github/actions/parse-distrib
        with:
          distrib: ${{ matrix.distrib }}

      - name: Check official repos for ${{ matrix.distrib }}
        run: |
          python3 .github/scripts/check-official-repos.py \
            --distrib ${{ matrix.distrib }} \
            --separator "${{ steps.parse-distrib.outputs.package_distrib_separator }}" \
            --suffix "${{ steps.parse-distrib.outputs.package_distrib_name }}" \
            --family "${{ steps.parse-distrib.outputs.distrib_family }}" \
            --output official-repos/partial-matrix-${{ matrix.distrib }}.json \
            .github/packaging/cpan-libraries.json
        shell: bash

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: partial-matrix-${{ matrix.distrib }}
          path: official-repos/partial-matrix-${{ matrix.distrib }}.json
          retention-days: 1

  generate-matrices:
    needs: [get-environment, check-official-repos]
    if: |
      needs.get-environment.outputs.skip_workflow == 'false' &&
      needs.get-environment.outputs.stability != 'stable'
    runs-on: ubuntu-24.04
    outputs:
      matrix_rpm: ${{ steps.generate.outputs.matrix_rpm }}
      matrix_deb: ${{ steps.generate.outputs.matrix_deb }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          pattern: partial-matrix-*
          path: official-repos/
          merge-multiple: true

      - name: Merge partial matrices into RPM and DEB matrices
        id: generate
        run: |
          python3 .github/scripts/generate-matrices.py \
            --partial-matrices-dir official-repos \
            --artifactory-url https://packages.centreon.com \
            .github/packaging/cpan-libraries.json
        shell: bash

      - name: Delete partial matrix artifacts
        uses: geekyeggo/delete-artifact@f275313e70c08f6120db482d7a6b98377786765b # v5.1.0
        with:
          name: partial-matrix-*
          failOnError: false

  get-packaging-images:
    needs: [get-environment]
    if: |
      needs.get-environment.outputs.skip_workflow == 'false' &&
      needs.get-environment.outputs.stability != 'stable'
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        include:
          - image: packaging-plugins-alma8
          - image: packaging-plugins-alma9
          - image: packaging-plugins-alma10
          - image: packaging-plugins-bullseye
          - image: packaging-plugins-bookworm
          - image: packaging-plugins-trixie
          - image: packaging-plugins-jammy
          - image: packaging-plugins-noble
          - image: packaging-plugins-bullseye-arm64
    runs-on: ${{ contains(matrix.image, 'arm') && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    steps:
      - name: Login to Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ${{ vars.DOCKER_INTERNAL_REGISTRY_URL }}
          username: ${{ secrets.HARBOR_CENTREON_PULL_USERNAME }}
          password: ${{ secrets.HARBOR_CENTREON_PULL_TOKEN }}

      - name: Login to Proxy Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ${{ vars.DOCKER_PROXY_REGISTRY_URL }}
          username: ${{ secrets.HARBOR_CENTREON_PULL_USERNAME }}
          password: ${{ secrets.HARBOR_CENTREON_PULL_TOKEN }}

      - name: Pull and save image
        run: |
          docker image prune -af
          docker pull ${{ vars.DOCKER_INTERNAL_REGISTRY_URL }}/${{ matrix.image }}:latest
          docker save -o ./${{ matrix.image }} ${{ vars.DOCKER_INTERNAL_REGISTRY_URL }}/${{ matrix.image }}:latest
        shell: bash

      - uses: actions/cache/save@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ./${{ matrix.image }}
          key: ${{ matrix.image }}-${{ github.sha }}-${{ github.run_id }}

  package-rpm:
    needs: [get-environment, generate-matrices, get-packaging-images]
    if: |
      needs.get-environment.outputs.skip_workflow == 'false' &&
      needs.get-environment.outputs.stability != 'stable'

    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix: ${{ fromJson(needs.generate-matrices.outputs.matrix_rpm) }}

    name: Package ${{ matrix.distrib }} ${{ matrix.name }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Restore packaging image from cache
        uses: actions/cache/restore@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ./${{ matrix.image }}
          key: ${{ matrix.image }}-${{ github.sha }}-${{ github.run_id }}
          fail-on-cache-miss: true

      - name: Load packaging image
        run: docker load --input ./${{ matrix.image }}
        shell: bash

      - if: ${{ matrix.spec_file == '' }}
        env:
          VERSION: ${{ matrix.version || matrix.cpan_version }}
          RPM_DEPENDENCIES: ${{ matrix.rpm_dependencies }}
          RPM_PROVIDES: ${{ matrix.rpm_provides }}
          NO_AUTO_DEPENDS: ${{ matrix.no-auto-depends }}
          PREINSTALL_CPANLIBS: ${{ matrix.preinstall_cpanlibs }}
          PKG_NAME: ${{ matrix.name }}
          PKG_EXT: ${{ matrix.package_extension }}
          DISTRIB: ${{ matrix.distrib }}
          REVISION: ${{ matrix.revision }}
        run: |
          docker run --rm \
            -v "$(pwd):/work" \
            --workdir /work \
            -e VERSION -e RPM_DEPENDENCIES -e RPM_PROVIDES \
            -e NO_AUTO_DEPENDS -e PREINSTALL_CPANLIBS \
            -e PKG_NAME -e PKG_EXT -e DISTRIB -e REVISION \
            "${{ vars.DOCKER_INTERNAL_REGISTRY_URL }}/${{ matrix.image }}:latest" \
            bash .github/scripts/package-cpan-rpm.sh
        shell: bash

      - if: ${{ matrix.spec_file != '' }}
        run: |
          docker run --rm \
            -v "$(pwd):/work" \
            --workdir /work \
            "${{ vars.DOCKER_INTERNAL_REGISTRY_URL }}/${{ matrix.image }}:latest" \
            bash -c "
              mkdir -p ~/rpmbuild/{BUILD,BUILDROOT,RPMS,SOURCES,SPECS,SRPMS}
              rpmbuild --undefine=_disable_source_fetch -ba ${{ matrix.spec_file }}
              cp -r ~/rpmbuild/RPMS/noarch/*.rpm /work/
            "
        shell: bash

      - name: Replace '::' with - in the feature path
        id: package-name
        run: |
          name="${{ matrix.name }}"
          name_with_dash="${name//::/-}"
          echo "name_with_dash=$name_with_dash" >> $GITHUB_OUTPUT
        shell: bash

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: packages-${{ matrix.package_extension }}-${{ matrix.distrib }}-${{ steps.package-name.outputs.name_with_dash }}
          path: ./*.${{ matrix.package_extension }}
          retention-days: 1

  merge-package-rpm-artifacts:
    needs: [get-environment, package-rpm]
    if: |
      needs.get-environment.outputs.skip_workflow == 'false' &&
      needs.get-environment.outputs.stability != 'stable'
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        distrib: [el8, el9, el10]

    steps:
      - name: Merge Artifacts
        uses: actions/upload-artifact/merge@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: packages-rpm-${{ matrix.distrib }}
          pattern: packages-rpm-${{ matrix.distrib }}-*
          delete-merged: false # cannot be set to true due to random fails: Failed to DeleteArtifact: Unable to make request: ECONNRESET
          retention-days: 1

      - name: Delete merged artifacts
        uses: geekyeggo/delete-artifact@f275313e70c08f6120db482d7a6b98377786765b # v5.1.0
        with:
          name: packages-rpm-${{ matrix.distrib }}-*
          failOnError: false

  sign-rpm:
    needs: [get-environment, merge-package-rpm-artifacts]
    if: |
      needs.get-environment.outputs.skip_workflow == 'false' &&
      needs.get-environment.outputs.stability != 'stable'

    runs-on: ubuntu-24.04
    strategy:
      matrix:
        distrib: [el8, el9, el10]
    name: sign rpm ${{ matrix.distrib }}
    container:
      image: docker.centreon.com/centreon-private/rpm-signing:latest
      options: -t
      credentials:
        username: ${{ secrets.HARBOR_CENTREON_PRIVATE_USERNAME }}
        password: ${{ secrets.HARBOR_CENTREON_PRIVATE_TOKEN }}

    steps:
      - run: apt-get install -y zstd
        shell: bash

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: packages-rpm-${{ matrix.distrib }}
          path: ./

      - run: echo "HOME=/root" >> $GITHUB_ENV
        shell: bash

      - run: rpmsign --addsign ./*.rpm
        shell: bash

      - uses: actions/cache/save@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ./*.rpm
          key: ${{ github.sha }}-${{ github.run_id }}-rpm-${{ matrix.distrib }}

  package-deb:
    needs: [get-environment, generate-matrices, get-packaging-images]
    if: |
      needs.get-environment.outputs.skip_workflow == 'false' &&
      needs.get-environment.outputs.stability != 'stable'

    runs-on: ${{ matrix.runner_name }}
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix: ${{ fromJson(needs.generate-matrices.outputs.matrix_deb) }}
    name: package ${{ matrix.distrib }} ${{ matrix.arch }} ${{ matrix.name }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Restore packaging image from cache
        uses: actions/cache/restore@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ./${{ matrix.image }}
          key: ${{ matrix.image }}-${{ github.sha }}-${{ github.run_id }}
          fail-on-cache-miss: true

      - name: Load packaging image
        run: docker load --input ./${{ matrix.image }}
        shell: bash

      - name: Parse distrib name
        id: parse-distrib
        uses: ./.github/actions/parse-distrib
        with:
          distrib: ${{ matrix.distrib }}

      - if: ${{ matrix.use_dh_make_perl == 'false' }}
        env:
          VERSION: ${{ matrix.version || matrix.cpan_version }}
          DEB_DEPENDENCIES: ${{ matrix.deb_dependencies }}
          DEB_PROVIDES: ${{ matrix.deb_provides }}
          NO_AUTO_DEPENDS: ${{ matrix.no-auto-depends }}
          PREINSTALL_CPANLIBS: ${{ matrix.preinstall_cpanlibs }}
          PKG_NAME: ${{ matrix.name }}
          PKG_EXT: ${{ matrix.package_extension }}
          DISTRIB: ${{ matrix.distrib }}
          REVISION: ${{ matrix.revision }}
          DISTRIB_SEPARATOR: ${{ steps.parse-distrib.outputs.package_distrib_separator }}
          DISTRIB_SUFFIX: ${{ steps.parse-distrib.outputs.package_distrib_name }}
        run: |
          docker run --rm \
            -v "$(pwd):/work" \
            --workdir /work \
            -e VERSION -e DEB_DEPENDENCIES -e DEB_PROVIDES \
            -e NO_AUTO_DEPENDS -e PREINSTALL_CPANLIBS \
            -e PKG_NAME -e PKG_EXT -e DISTRIB -e REVISION \
            -e DISTRIB_SEPARATOR -e DISTRIB_SUFFIX \
            "${{ vars.DOCKER_INTERNAL_REGISTRY_URL }}/${{ matrix.image }}:latest" \
            bash .github/scripts/package-cpan-deb-fpm.sh
        shell: bash

      - if: ${{ matrix.use_dh_make_perl == 'true' }}
        env:
          VERSION: ${{ matrix.version || matrix.cpan_version }}
          PREINSTALL_CPANLIBS: ${{ matrix.preinstall_cpanlibs }}
          PKG_NAME: ${{ matrix.name }}
          DISTRIB: ${{ matrix.distrib }}
          REVISION: ${{ matrix.revision }}
          DISTRIB_SEPARATOR: ${{ steps.parse-distrib.outputs.package_distrib_separator }}
          DISTRIB_SUFFIX: ${{ steps.parse-distrib.outputs.package_distrib_name }}
        run: |
          docker run --rm \
            -v "$(pwd):/work" \
            --workdir /work \
            -e VERSION -e PREINSTALL_CPANLIBS \
            -e PKG_NAME -e DISTRIB -e REVISION \
            -e DISTRIB_SEPARATOR -e DISTRIB_SUFFIX \
            "${{ vars.DOCKER_INTERNAL_REGISTRY_URL }}/${{ matrix.image }}:latest" \
            bash .github/scripts/package-cpan-deb-dhmaker.sh
        shell: bash

      - name: Replace '::' with - in the feature path
        id: package-name
        run: |
          name="${{ matrix.name }}"
          name_with_dash="${name//::/-}"
          echo "name_with_dash=$name_with_dash" >> $GITHUB_OUTPUT
        shell: bash

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: packages-${{ matrix.package_extension }}-${{ matrix.distrib }}-${{ matrix.arch }}-${{ steps.package-name.outputs.name_with_dash}}
          path: ./*.${{ matrix.package_extension }}
          retention-days: 1

  merge-package-deb-artifacts:
    needs: [get-environment, package-deb]
    if: |
      needs.get-environment.outputs.skip_workflow == 'false' &&
      needs.get-environment.outputs.stability != 'stable'
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        distrib: [bullseye, bookworm, trixie, jammy, noble]

    steps:
      - name: Merge Artifacts
        uses: actions/upload-artifact/merge@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: packages-deb-${{ matrix.distrib }}
          pattern: packages-deb-${{ matrix.distrib }}-*
          delete-merged: false # cannot be set to true due to random fails: Failed to DeleteArtifact: Unable to make request: ECONNRESET
          retention-days: 1

      - name: Delete merged artifacts
        uses: geekyeggo/delete-artifact@f275313e70c08f6120db482d7a6b98377786765b # v5.1.0
        with:
          name: packages-deb-${{ matrix.distrib }}-*
          failOnError: false

  download-and-cache-deb:
    needs: [get-environment, merge-package-deb-artifacts]
    if: |
      needs.get-environment.outputs.skip_workflow == 'false' &&
      needs.get-environment.outputs.stability != 'stable'
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        distrib: [bullseye, bookworm, trixie, jammy, noble]
    steps:
      - uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: packages-deb-${{ matrix.distrib }}
          path: ./

      - uses: actions/cache/save@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ./*.deb
          key: ${{ github.sha }}-${{ github.run_id }}-deb-${{ matrix.distrib }}

  test-packages:
    needs: [get-environment, sign-rpm, download-and-cache-deb]
    strategy:
      fail-fast: false
      matrix:
        include:
          - package_extension: rpm
            image: almalinux:8
            distrib: el8
            arch: amd64
            runner_name: ubuntu-24.04
          - package_extension: rpm
            image: almalinux:9
            distrib: el9
            arch: amd64
            runner_name: ubuntu-24.04
          - package_extension: rpm
            image: almalinux:10
            distrib: el10
            arch: amd64
            runner_name: ubuntu-24.04
          - package_extension: deb
            image: debian:bullseye
            distrib: bullseye
            arch: amd64
            runner_name: ubuntu-24.04
          - package_extension: deb
            image: debian:bookworm
            distrib: bookworm
            arch: amd64
            runner_name: ubuntu-24.04
          - package_extension: deb
            image: debian:trixie
            distrib: trixie
            arch: amd64
            runner_name: ubuntu-24.04
          - package_extension: deb
            image: ubuntu:jammy
            distrib: jammy
            arch: amd64
            runner_name: ubuntu-24.04
          - package_extension: deb
            image: ubuntu:noble
            distrib: noble
            arch: amd64
            runner_name: ubuntu-24.04
          - package_extension: deb
            image: debian:bullseye
            distrib: bullseye
            arch: arm64
            runner_name: ubuntu-24.04-arm

    runs-on: ${{ matrix.runner_name }}
    container:
      image: ${{ matrix.image }}

    name: Test perl CPAN libs packages on ${{ matrix.package_extension }} ${{ matrix.distrib }} ${{ matrix.arch }}
    steps:

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Test packaged libs
        uses: ./.github/actions/test-cpan-libs
        with:
          package_extension: ${{ matrix.package_extension }}
          distrib: ${{ matrix.distrib }}
          arch: ${{ matrix.arch }}

      - name: Upload error log
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: install_error_log_${{ matrix.distrib }}-${{ matrix.arch }}
          path: install_error_${{ matrix.distrib }}_${{ matrix.arch }}.log

  deliver-packages:
    needs: [get-environment, sign-rpm, download-and-cache-deb, test-packages]
    if: |
      needs.get-environment.outputs.skip_workflow == 'false' &&
      (contains(fromJson('["testing", "unstable"]'), needs.get-environment.outputs.stability) || ( needs.get-environment.outputs.stability == 'stable' && github.event_name != 'workflow_dispatch')) &&
      ! cancelled() &&
      ! contains(needs.*.result, 'failure') &&
      ! contains(needs.*.result, 'cancelled')
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - distrib: el8
            package_extension: rpm
          - distrib: el9
            package_extension: rpm
          - distrib: el10
            package_extension: rpm
          - distrib: bullseye
            package_extension: deb
          - distrib: bookworm
            package_extension: deb
          - distrib: trixie
            package_extension: deb
          - distrib: jammy
            package_extension: deb
          - distrib: noble
            package_extension: deb

    name: deliver ${{ matrix.distrib }}
    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Delivery
        uses: ./.github/actions/package-delivery
        with:
          module_name: perl-cpan-libraries
          distrib: ${{ matrix.distrib }}
          cache_key: ${{ github.sha }}-${{ github.run_id }}-${{ matrix.package_extension }}-${{ matrix.distrib }}
          stability: ${{ needs.get-environment.outputs.stability }}
          release_type: ${{ needs.get-environment.outputs.release_type }}
          artifactory_token: ${{ secrets.ARTIFACTORY_ACCESS_TOKEN }}

  set-skip-label:
    needs: [get-environment, deliver-packages]
    if: |
      needs.get-environment.outputs.skip_workflow == 'false' &&
      ! cancelled() &&
      ! contains(needs.*.result, 'failure') &&
      ! contains(needs.*.result, 'cancelled')
    uses: ./.github/workflows/set-pull-request-skip-label.yml
